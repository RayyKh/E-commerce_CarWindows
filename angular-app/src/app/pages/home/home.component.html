<section class="relative text-white">
  <img [src]="heroImage" alt="Installation de vitrage automobile" class="absolute inset-0 w-full h-full object-cover">
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 min-h-[460px] flex items-center justify-center">
    <div class="max-w-3xl text-center">
      <h1 sa="fade-up" class="text-3xl md:text-6xl font-extrabold leading-tight mb-4">
        Vitres automobiles <span class="text-[#4cb0ff]">de qualité</span> en Tunisie
      </h1>
      <p sa="fade-up" class="text-gray-200 text-lg md:text-xl mb-8">
        Pare-brise, vitres latérales et lunettes arrière pour toutes les marques.
        Qualité OEM garantie avec livraison partout en Tunisie.
      </p>
      <form sa="fade-up" (submit)="onSearch($event)" class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-xl p-4 sm:p-5 max-w-3xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
          <div class="md:col-span-1">
            <select class="w-full px-4 py-3 rounded-lg border border-gray-200 text-gray-800"
                    [ngModel]="selectedBrand()" (ngModelChange)="onBrandChange($event)" name="brand">
              <option value="all">Marque</option>
              <option *ngFor="let b of brandsSig()" [value]="b">{{ b }}</option>
            </select>
          </div>
          <div class="md:col-span-1">
            <select class="w-full px-4 py-3 rounded-lg border border-gray-200 text-gray-800"
                    [ngModel]="selectedYear()" (ngModelChange)="selectedYear.set($event)" name="year">
              <option value="all">Année</option>
              <option *ngFor="let y of years()" [value]="y">{{ y }}</option>
            </select>
          </div>
          <div class="md:col-span-1">
            <button class="w-full bg-[#1F3A5F] text-white px-5 py-3 rounded-lg font-semibold hover:bg-[#2d5080] transition-colors">
              Rechercher
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</section>

<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <h2 class="text-2xl md:text-3xl font-bold text-[#1F3A5F] mb-6 text-center">Produits populaires</h2>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    <app-product-card *ngFor="let p of featured" [product]="p" />
  </div>
</section>
