<div class="min-h-screen bg-[#F5F5F5]">
  <div class="bg-white border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <a routerLink="/catalogue" class="inline-flex items-center space-x-2 text-[#1F3A5F] hover:underline">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        <span>Retour au catalogue</span>
      </a>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" *ngIf="product(); else notFound">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
      <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <img [src]="product()?.image" [alt]="product()?.name" class="w-full h-[400px] object-cover" (error)="onImgError($event)" />
      </div>
      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-[#1F3A5F] mb-4">{{ product()?.name }}</h1>
        <div class="text-gray-600 mb-4">{{ product()?.brand }} {{ product()?.model }} • {{ product()?.year }}</div>
        <p class="text-gray-700 mb-6">{{ product()?.description }}</p>
        <div class="flex items-center justify-between mb-6">
          <span class="px-3 py-1 text-sm rounded-full" [ngClass]="availabilityClass(product()?.availability || '')">
            {{ product()?.availability }}
          </span>
          <span class="text-3xl font-bold text-[#1F3A5F]">{{ product()?.price }} DT</span>
        </div>
        <button
          class="w-full bg-[#1F3A5F] text-white px-8 py-4 rounded-lg text-lg font-semibold hover:bg-[#2d5080] transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          (click)="addToCart()"
          [disabled]="product()?.availability === 'Rupture'"
        >
          Ajouter au panier
        </button>
      </div>
    </div>

    <section *ngIf="similar().length > 0">
      <h2 class="text-2xl md:text-3xl font-bold text-[#1F3A5F] mb-6">Produits Similaires</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <app-product-card *ngFor="let p of similar()" [product]="p" />
      </div>
    </section>
  </div>

  <ng-template #notFound>
    <div class="min-h-screen bg-[#F5F5F5] flex items-center justify-center">
      <div class="text-center">
        <h1 class="text-2xl font-bold text-[#1F3A5F] mb-4">Produit non trouvé</h1>
        <a routerLink="/catalogue" class="inline-flex items-center space-x-2 text-[#1F3A5F] hover:underline">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          <span>Retour au catalogue</span>
        </a>
      </div>
    </div>
  </ng-template>
</div>
