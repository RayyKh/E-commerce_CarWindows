<a sa="fade-up" [routerLink]="['/produit', product.id]" class="block bg-white rounded-xl shadow-sm overflow-hidden hover:shadow-lg transition-all duration-300 group">
  <div class="relative aspect-[4/3] overflow-hidden">
    <img [src]="product.image" [alt]="product.name + ' pour ' + product.brand + ' ' + product.model" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" (error)="onImgError($event)" />
    <div class="absolute top-2 left-2">
      <span class="px-2 py-1 text-[10px] md:text-xs font-bold rounded-lg shadow-sm backdrop-blur-md" [ngClass]="availabilityClass(product.availability)">
        {{ product.availability }}
      </span>
    </div>
  </div>
  <div class="p-3 md:p-4">
    <h3 class="text-sm md:text-lg font-bold text-[#1F3A5F] mb-1 truncate group-hover:text-[#4cb0ff] transition-colors">{{ product.name }}</h3>
    <p class="text-[10px] md:text-sm text-gray-500 mb-3 truncate font-medium">{{ product.brand }} {{ product.model }} • {{ product.year }}</p>
    <div class="flex items-center justify-between gap-2">
      <span class="text-sm md:text-xl font-extrabold text-[#1F3A5F] whitespace-nowrap">{{ product.price }} DT</span>
      <button
        (click)="addToCart($event)"
        [disabled]="product.availability === 'Rupture'"
        class="bg-[#1F3A5F] text-white px-3 py-1.5 md:px-4 md:py-2 rounded-lg text-[10px] md:text-sm font-bold hover:bg-[#2d5080] active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed whitespace-nowrap"
      >
        Ajouter
      </button>
    </div>
  </div>
</a>
