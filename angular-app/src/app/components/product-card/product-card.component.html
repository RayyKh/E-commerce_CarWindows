<a [routerLink]="['/produit', product?.id]" class="block bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow">
  <div class="relative">
    <img [src]="product?.image" [alt]="product?.name" class="w-full h-48 object-cover" />
    <div class="absolute top-2 left-2">
      <span class="px-3 py-1 text-xs rounded-full" [ngClass]="availabilityClass(product?.availability || '')">
        {{ product?.availability }}
      </span>
    </div>
  </div>
  <div class="p-4">
    <h3 class="text-lg font-semibold text-[#1F3A5F] mb-1 truncate">{{ product?.name }}</h3>
    <p class="text-sm text-gray-600 mb-2 truncate">{{ product?.brand }} {{ product?.model }} • {{ product?.year }}</p>
    <div class="flex items-center justify-between">
      <span class="text-xl font-bold text-[#1F3A5F]">{{ product?.price }}€</span>
      <button
        (click)="addToCart($event)"
        [disabled]="product?.availability === 'Rupture'"
        class="bg-[#1F3A5F] text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-[#2d5080] transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Ajouter
      </button>
    </div>
  </div>
</a>
