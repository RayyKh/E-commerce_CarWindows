<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <h1 class="text-2xl md:text-3xl font-bold text-[#1F3A5F] mb-6">Assets (Photos & Vidéos)</h1>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let img of images()" class="bg-white rounded-lg shadow overflow-hidden">
      <img [src]="img" alt="Asset image" class="w-full h-56 object-cover">
      <div class="p-4 text-sm text-gray-600">Image</div>
    </div>
  </div>
  <div class="mt-10">
    <h2 class="text-xl font-semibold text-[#1F3A5F] mb-4">Vidéos</h2>
    <div *ngIf="videos().length === 0" class="text-gray-600">Aucune vidéo pour le moment.</div>
  </div>
</div>
